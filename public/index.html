<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTalks: One Day of Innovation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <header>
        <div class="container">
            <h1>TechTalks <span class="accent">2026</span></h1>
            <p class="subtitle">March 14 • 10:00 AM - 5:40 PM • Single Track</p>
        </div>
    </header>

    <main class="container">
        <section class="search-bar">
            <input type="text" id="categorySearch" placeholder="Search by category (e.g., AI, Backend, Web)..." autocomplete="off">
            <span class="search-hint">Matching talks will be highlighted below</span>
        </section>

        <section id="schedule" class="schedule-grid">
            <!-- Schedule items will be injected here by script.js -->
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 TechTalks Event Team. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
